name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --legacy-peer-deps

      - run: npm run build

      - name: Debug build output
        run: |
          echo "--- node version ---"
          node --version
          echo "--- checking dist/build ---"
          if (Test-Path dist/build/index.html) {
            Write-Host "index.html FOUND"
            Get-Content dist/build/index.html -TotalCount 3
          } else {
            Write-Host "index.html NOT FOUND"
            echo "--- looking for index.html ---"
            Get-ChildItem -Recurse -Filter index.html | Select-Object FullName
          }

