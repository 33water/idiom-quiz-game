name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --legacy-peer-deps
      - run: npm run build

      - name: Fix asset paths for subdirectory deployment
        shell: powershell
        run: |
          (Get-Content dist/build/index.html -Raw) -replace '(href|src)="/assets/', '$1="/idiom-quiz-game/assets/' | Set-Content dist/build/index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/build
      - id: deployment
        uses: actions/deploy-pages@v4
