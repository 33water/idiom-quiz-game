name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --legacy-peer-deps

      - run: npm run build

      - name: Fix asset paths for subdirectory deployment
        run: node scripts/fix-paths.js

      - name: Locate build output
        id: locate
        shell: pwsh
        run: |
          if (Test-Path "dist/build/h5/index.html") {
            $dir = "dist/build/h5"
          } elseif (Test-Path "dist/build/index.html") {
            $dir = "dist/build"
          } else {
            Write-Host "ERROR: index.html not found"
            Get-ChildItem -Recurse -Filter index.html | Select-Object FullName
            exit 1
          }
          Write-Host "BUILD_DIR=$dir"
          echo "BUILD_DIR=$dir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.BUILD_DIR }}

      - id: deployment
        uses: actions/deploy-pages@v4
